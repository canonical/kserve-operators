[flake8]
max-line-length = 100

[tox]
skipsdist = True
skip_missing_interpreters = True
envlist = {kserve-controller,kserve-llmisvc}-{unit,lint},kserve-controller-{integration,integration-ambient},lint,bundle-integration

[vars]
all_path = {[vars]src_path} {[vars]tst_path}
src_path = {toxinidir}/src/
tst_path = {toxinidir}/tests/

[testenv]
allowlist_externals =
	tox
setenv =
	kserve-controller: CHARM_DIR = kserve-controller
	kserve-llmisvc: CHARM_DIR = kserve-llmisvc
	fmt: TYPE = fmt
	unit: TYPE = unit
	lint: TYPE = lint
	integration: TYPE = integration
	integration-ambient: TYPE = integration-ambient
commands =
	tox -c charms/{env:CHARM_DIR} -e {env:TYPE} -- {posargs}
deps =
	poetry>=2.1.3

[testenv:fmt]
commands =
	isort {[vars]tst_path}
	black {[vars]tst_path}
description = Apply coding style standards to code
commands_pre =
	poetry install --only fmt
skip_install = true

[testenv:lint]
commands =
	flake8 {[vars]tst_path}
	isort --check-only --diff {[vars]tst_path}
	black --check --diff {[vars]tst_path}
description = Check code against coding style standards
commands_pre =
	poetry install --only lint
skip_install = true

[testenv:bundle-integration]
description = Run bundle integration tests with both charms and external Helm-managed infra
commands =
	pytest -vv --tb=native -s --log-cli-level=INFO {[vars]tst_path}integration/test_bundle.py {posargs}
commands_pre =
	poetry install --only integration
skip_install = true

[testenv:update-requirements]
commands =
	# updating all groups' locked dependencies:
	poetry lock --regenerate
	# updating all groups' locked dependencies for every charm subfolder:
	find charms/ -maxdepth 1 -mindepth 1 -type d -exec bash -c "cd {} && poetry lock --regenerate" \;
description = Update requirements, including those in charm subfolders
allowlist_externals = find
skip_install = true
