name: CI

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
  schedule:
    - cron: '0 8 * * TUE'
  # Triggered on push by .github/workflows/release.yaml
  workflow_call:
    outputs:
      artifact-prefix:
        description: build_charm.yaml `artifact-prefix` output
        value: ${{ jobs.build.outputs.artifact-prefix }}
      charm-paths:
        description: paths for all charms in this repo
        value: ${{ jobs.get-charm-paths-track.outputs.charm-paths }}
      track:
        description: Charmhub track determined from branch name
        value: ${{ jobs.get-charm-paths-track.outputs.track }}

jobs:
  get-charm-paths-track:
    name: Get charm paths and track
    runs-on: ubuntu-latest
    outputs:
      charm-paths: ${{ steps.get-charm-paths.outputs.charm-paths }}
      track: ${{ steps.determine-track.outputs.track }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Get paths for all charms in this repo
        id: get-charm-paths
        uses: canonical/kubeflow-ci/actions/get-charm-paths@main
      - name: Determine track
        id: determine-track
        shell: python
        run: |
          import os

          if "${{ github.event_name }}" == "pull_request":
              ref = "${{ github.base_ref }}"
          else:
              ref = "${{ github.ref_name }}"

          if ref.startswith("track/"):
              track = ref.removeprefix("track/")
          else:
              track = "latest"

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"track={track}\n")

          print(f"Track: {track}")

  lint:
    name: Lint Code
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        charm: [kserve-controller, kserve-llmisvc]
    steps:
      - uses: actions/checkout@v4
      - run: pipx install tox
      - run: tox -e ${{ matrix.charm }}-lint

  unit:
    name: Unit Test
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        charm: [kserve-controller, kserve-llmisvc]
    steps:
      - uses: actions/checkout@v4
      - run: pipx install tox
      - run: tox -e ${{ matrix.charm }}-unit

  terraform-checks:
    name: Terraform
    needs:
      - get-charm-paths-track
    uses: canonical/charmed-kubeflow-workflows/.github/workflows/terraform-checks.yaml@main
    strategy:
      fail-fast: false
      matrix:
        charm: ${{ fromJSON(needs.get-charm-paths-track.outputs.charm-paths) }}
    with:
      charm-path: ${{ matrix.charm }}

  build:
    strategy:
      matrix:
        charm: ${{ fromJSON(needs.get-charm-paths-track.outputs.charm-paths) }}
    name: Build charm | ${{ matrix.charm }}
    needs:
      - get-charm-paths-track
    uses: canonical/data-platform-workflows/.github/workflows/build_charm.yaml@v49.0.1
    with:
      path-to-charm-directory: ${{ matrix.charm }}
      cache: true
    permissions:
      actions: read  # Needed for GitHub API call to get workflow version (for private repositories)
      contents: read

  build-test-charms:
    name: Build charm | ${{ matrix.charm }}
    strategy:
      fail-fast: false
      matrix:
        charm:
          - tests/integration/lws-controller-tester
          - tests/integration/gateway-metadata-provider-tester
    uses: canonical/data-platform-workflows/.github/workflows/build_charm.yaml@v49.0.1
    with:
      path-to-charm-directory: ${{ matrix.charm }}
      cache: true
    permissions:
      actions: read
      contents: read

  integration:
    name: Integration tests
    needs:
      - build
    strategy:
      fail-fast: false
      matrix:
        charm: [kserve-controller]
        test-type: [integration, integration-ambient]
    runs-on: ubuntu-24.04
    steps:
      - name: Maximise GH runner space
        uses: jlumbroso/free-disk-space@v1.3.1

      - name: Check out repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pipx install tox

      - name: Setup environment
        run: |
          sudo apt-get remove -y docker-ce docker-ce-cli containerd.io
          sudo rm -rf /run/containerd
          sudo snap install concierge --classic
          sudo concierge prepare --trace

      - name: Download packed charm(s)
        id: download-charms
        timeout-minutes: 5
        uses: actions/download-artifact@v4
        with:
          pattern: ${{ needs.build.outputs.artifact-prefix }}-*
          merge-multiple: true

      - name: Run integration tests
        run: |
          juju add-model kubeflow --config automatically-retry-hooks=false
          tox -e ${{ matrix.charm }}-${{ matrix.test-type }} -- --model kubeflow --charm-path=${{ github.workspace }}/charms/${{ matrix.charm }}/${{ matrix.charm }}_ubuntu@24.04-amd64.charm

      - name: Get all
        run: kubectl get all -A
        if: failure()

      - name: Get inference servers
        run: kubectl get inferenceservices -A
        if: failure()

      - name: Get events
        run: kubectl get events -A
        if: failure()

      - name: Describe deployments
        run: kubectl describe deployments -A
        if: failure()

      - name: Describe replicasets
        run: kubectl describe replicasets -A
        if: failure()

      - name: Get juju status
        run: juju status
        if: always()

      - name: Get application logs
        run: kubectl logs -n kubeflow --tail 1000 -l app.kubernetes.io/name=${{ matrix.charm }} --all-containers
        if: failure()

  test-bundle:
    name: Bundle integration tests
    needs:
      - build
      - build-test-charms
    runs-on: ubuntu-24.04
    steps:
      - name: Maximise GH runner space
        uses: jlumbroso/free-disk-space@v1.3.1

      - name: Check out repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pipx install tox

      - name: Setup environment
        run: |
          sudo apt-get remove -y docker-ce docker-ce-cli containerd.io
          sudo rm -rf /run/containerd
          sudo snap install concierge --classic
          sudo concierge prepare --trace

      - name: Download packed charm(s)
        id: download-charms
        timeout-minutes: 5
        uses: actions/download-artifact@v4
        with:
          pattern: ${{ needs.build.outputs.artifact-prefix }}-*
          merge-multiple: true

      - name: Download packed test charm(s)
        timeout-minutes: 5
        uses: actions/download-artifact@v4
        with:
          pattern: ${{ needs.build-test-charms.outputs.artifact-prefix }}-*
          merge-multiple: true
          path: ${{ github.workspace }}/tests/integration/

      - name: Run bundle integration tests
        run: |
          juju add-model kubeflow --config automatically-retry-hooks=false
          tox -e bundle-integration -- --model kubeflow --charms-path=${{ github.workspace }}/charms/

      - name: Get all
        run: kubectl get all -A
        if: failure()

      - name: Get events
        run: kubectl get events -A
        if: failure()

      - name: Describe deployments
        run: kubectl describe deployments -A
        if: failure()

      - name: Describe replicasets
        run: kubectl describe replicasets -A
        if: failure()

      - name: Get juju status
        run: juju status --relations
        if: always()

      - name: Get kserve-controller workload logs
        run: kubectl logs --tail 1000 -n kubeflow -l app.kubernetes.io/name=kserve-controller -c kserve-controller
        if: failure()

      - name: Get kserve-controller charm logs
        run: kubectl logs --tail 1000 -n kubeflow -l app.kubernetes.io/name=kserve-controller -c charm
        if: failure()

      - name: Get kserve-llmisvc workload logs
        run: kubectl logs --tail 1000 -n kubeflow -l app.kubernetes.io/name=kserve-llmisvc -c llmisvc-controller
        if: failure()

      - name: Get kserve-llmisvc charm logs
        run: kubectl logs --tail 1000 -n kubeflow -l app.kubernetes.io/name=kserve-llmisvc -c charm
        if: failure()

      - name: Collect charm debug artifacts
        uses: canonical/kubeflow-ci/actions/dump-charm-debug-artifacts@main
        if: failure()

  release:
    strategy:
      matrix:
        charm: ${{ fromJSON(needs.get-charm-paths-track.outputs.charm-paths) }}
    name: Release charm to Charmhub branch | ${{ matrix.charm }}
    if: ${{ github.event_name == 'pull_request' }}
    needs:
      - get-charm-paths-track
      - build
    uses: canonical/data-platform-workflows/.github/workflows/release_charm_pr.yaml@v49.0.1
    with:
      track: ${{ needs.get-charm-paths-track.outputs.track }}
      artifact-prefix: ${{ needs.build.outputs.artifact-prefix }}
      path-to-charm-directory: ${{ matrix.charm }}
    secrets:
      charmhub-token: ${{ secrets.CHARMCRAFT_CREDENTIALS }}
    permissions:
      actions: read  # Needed for GitHub API call to get workflow version (for private repositories)
      contents: read
