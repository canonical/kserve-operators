# Minimal LeaderWorkerSet used by the integration tests to verify the
# controller reconciles workloads. A single group of size 2 (one leader + one
# worker) keeps the resource footprint small for constrained CI runners. The
# namespace is injected at apply time to match the Juju model namespace.
apiVersion: leaderworkerset.x-k8s.io/v1
kind: LeaderWorkerSet
metadata:
  name: lws-sample
spec:
  replicas: 1
  leaderWorkerTemplate:
    size: 2
    leaderTemplate:
      spec:
        containers:
          - name: leader
            image: nginx
            resources:
              requests:
                cpu: "50m"
                memory: "64Mi"
    workerTemplate:
      spec:
        containers:
          - name: worker
            image: nginx
            resources:
              requests:
                cpu: "50m"
                memory: "64Mi"
